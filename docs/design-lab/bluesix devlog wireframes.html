<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bluesix devlog · wireframe directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --wf-paper: #fbfaf7;
    --wf-ink: #2c2b29;
    --wf-soft: #76746e;
    --wf-bar: #dcdad3;
    --wf-line: #d0cec7;
    --wf-accent: #3a6df0;
    --wf-marker: #2f6fb0;
    --wf-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --wf-mono: "Spline Sans Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    --wf-serif: Georgia, "Times New Roman", serif;
    --wf-hand: "Caveat", cursive;
  }
  * { box-sizing: border-box; }

  /* ---------- shared wireframe paper ---------- */
  .wf {
    position: relative;
    min-height: 100%;
    background: var(--wf-paper);
    color: var(--wf-ink);
    font-family: var(--wf-sans);
    padding: 26px 30px 30px;
  }
  .wf--d { padding-right: 158px; }   /* reserve a right gutter for margin notes */

  /* wireframe media box (hatched) */
  .wf-ph {
    display: flex; align-items: center; justify-content: center;
    background: repeating-linear-gradient(45deg, #eceae5 0 9px, #f6f5f1 9px 18px);
    border: 1.5px dashed #b9b6ad;
    border-radius: 11px 5px 13px 6px;
    color: #908d85; font-family: var(--wf-mono); font-size: 11px; letter-spacing: .04em;
  }

  /* chips */
  .wf-chip {
    display: inline-block; font-family: var(--wf-mono); font-size: 10px; line-height: 1;
    padding: 4px 7px; border: 1.5px solid var(--wf-ink); border-radius: 7px 4px 8px 3px;
    color: var(--wf-ink); white-space: nowrap;
  }
  .wf-chip--ver { border-color: var(--wf-accent); color: var(--wf-accent); }
  .wf-chip--feat { background: #eef2ff; }
  .wf-chip--perf { background: #eafaf1; }
  .wf-chip--fix { background: #fff6e9; }
  .wf-chip--break { background: #fdeced; }
  .wf-chip--note,
  .wf-chip--plain { color: var(--wf-soft); border-color: var(--wf-line); }

  /* handwritten margin annotation */
  .wf-anno {
    font-family: var(--wf-hand); font-size: 17px; line-height: 1.05;
    color: var(--wf-marker); transform: rotate(-1.4deg);
  }
  .wf-anno::before { content: "✎ "; opacity: .6; }

  /* ================= A · TERMINAL ================= */
  .ta { font-family: var(--wf-mono); }
  .ta-top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; border-bottom: 1.5px solid var(--wf-line); }
  .ta-brand { display: flex; align-items: center; gap: 10px; }
  .ta-path { font-size: 15px; font-weight: 600; }
  .ta-dim { color: var(--wf-soft); font-weight: 400; }
  .ta-nav { display: flex; gap: 18px; font-size: 12px; color: var(--wf-soft); }
  .ta-burger { font-size: 20px; line-height: 1; }
  .ta-prompt { margin: 18px 0 6px; font-size: 13px; color: var(--wf-soft); display: flex; align-items: center; gap: 2px; }
  .ta-cursor { display: inline-block; width: 8px; height: 15px; background: var(--wf-accent); animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .ta-list { display: flex; flex-direction: column; }
  .ta-row { padding: 16px 0; border-bottom: 1px dashed var(--wf-line); }
  .ta-meta { font-size: 11.5px; color: var(--wf-soft); }
  .ta-title { font-size: 17px; font-weight: 600; margin: 6px 0 5px; }
  .ta-caret { color: var(--wf-accent); }
  .ta-body { font-size: 12.5px; line-height: 1.5; color: #45433f; max-width: 60ch; }
  .ta-tags { display: flex; gap: 10px; margin-top: 9px; font-size: 11px; color: var(--wf-accent); }
  .ta-foot { margin-top: 20px; font-size: 11.5px; color: var(--wf-soft); }
  .ta--m { padding: 20px 18px; }
  .ta--m .ta-title { font-size: 15px; }
  .ta--m .ta-body { font-size: 12px; }

  /* ================= B · EDITORIAL ================= */
  .eb-masthead { display: flex; align-items: flex-end; justify-content: space-between; }
  .eb-kicker { display: flex; align-items: center; gap: 7px; font-family: var(--wf-mono); font-size: 11px; letter-spacing: .22em; color: var(--wf-soft); }
  .eb-wordmark { font-family: var(--wf-serif); font-style: italic; font-size: 50px; line-height: 1; margin-top: 4px; }
  .eb-dateline { font-family: var(--wf-serif); font-size: 12.5px; color: var(--wf-soft); margin-top: 8px; }
  .eb-nav { display: flex; gap: 20px; font-family: var(--wf-mono); font-size: 11.5px; color: var(--wf-soft); padding-bottom: 6px; }
  .eb-rule { height: 0; border-top: 2.5px solid var(--wf-ink); margin: 14px 0 22px; }
  .eb-hero { display: grid; grid-template-columns: 1.15fr 1fr; gap: 26px; align-items: center; }
  .eb-kick2 { font-family: var(--wf-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--wf-accent); margin-bottom: 10px; }
  .eb-hero-title { font-family: var(--wf-serif); font-weight: 700; font-size: 30px; line-height: 1.12; margin: 0 0 12px; }
  .eb-hero-dek { font-family: var(--wf-serif); font-size: 15.5px; line-height: 1.5; color: #45433f; margin: 0 0 14px; }
  .eb-meta { font-family: var(--wf-mono); font-size: 11px; color: var(--wf-soft); }
  .eb-section-label { display: flex; align-items: center; gap: 14px; margin: 34px 0 18px; }
  .eb-section-label > span:first-child { font-family: var(--wf-mono); font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--wf-ink); }
  .eb-hr { flex: 1; height: 0; border-top: 1.5px solid var(--wf-line); }
  .eb-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 26px 30px; }
  .eb-card-title { font-family: var(--wf-serif); font-weight: 700; font-size: 19px; line-height: 1.18; margin: 13px 0 7px; }
  .eb-card-dek { font-family: var(--wf-serif); font-size: 13.5px; line-height: 1.45; color: #4c4a45; margin: 0 0 9px; }
  .eb--m { }
  .eb--m .eb-wordmark { font-size: 38px; }
  .eb--m .eb-hero--m { display: block; }
  .eb--m .eb-hero-title { font-size: 23px; margin-top: 14px; }
  .eb--m .eb-grid--m { grid-template-columns: 1fr; }

  /* ================= C · CHANGELOG ================= */
  .cc { display: flex; gap: 30px; padding-top: 28px; }
  .cc-side { flex: 0 0 188px; display: flex; flex-direction: column; gap: 18px; border-right: 1.5px solid var(--wf-line); padding-right: 22px; }
  .cc-brand { display: flex; align-items: flex-start; gap: 10px; font-weight: 700; font-size: 15px; line-height: 1.1; }
  .cc-brand em { font-style: normal; font-weight: 400; color: var(--wf-soft); font-size: 12px; }
  .cc-search { font-size: 12px; color: var(--wf-soft); border: 1.5px solid var(--wf-line); border-radius: 8px 4px 9px 4px; padding: 8px 10px; font-family: var(--wf-mono); }
  .cc-nav { display: flex; flex-direction: column; gap: 11px; font-size: 13px; color: var(--wf-soft); }
  .cc-nav-on { color: var(--wf-ink); font-weight: 600; border-left: 2.5px solid var(--wf-accent); padding-left: 8px; margin-left: -10px; }
  .cc-filter-label { font-family: var(--wf-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--wf-soft); }
  .cc-filters { display: flex; gap: 7px; }
  .cc-main { flex: 1; min-width: 0; }
  .cc-h1 { font-size: 27px; margin: 0; font-weight: 700; }
  .cc-sub { font-size: 13.5px; color: var(--wf-soft); margin: 6px 0 24px; }
  .cc-entries { display: flex; flex-direction: column; gap: 26px; }
  .cc-entry { border-left: 2px solid var(--wf-line); padding-left: 18px; }
  .cc-entry-head { display: flex; align-items: center; gap: 12px; }
  .cc-date { font-family: var(--wf-mono); font-size: 11.5px; color: var(--wf-soft); }
  .cc-entry-title { font-size: 18px; margin: 9px 0 0; font-weight: 600; }
  .cc-chips { display: flex; gap: 7px; margin: 10px 0; }
  .cc-items { margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 6px; }
  .cc-items li { font-size: 13px; line-height: 1.5; color: #45433f; }
  .cc-mbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; border-bottom: 1.5px solid var(--wf-line); }
  .cc-brand--m { font-size: 14px; align-items: center; }
  .cc-main--m { padding-top: 18px; }
  .cc--m { display: block; padding: 20px 18px; }

  /* canvas frame */
  html, body { margin: 0; height: 100%; background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="wf-a-terminal.jsx"></script>
<script type="text/babel" src="wf-b-editorial.jsx"></script>
<script type="text/babel" src="wf-c-changelog.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="a" title="A · Terminal Feed"
          subtitle="Sleek/techy. Monospace, reverse-chron list keyed on a build number. Copy is terse and lowercase, like commit messages.">
          <DCArtboard id="a-d" label="Desktop" width={940} height={900}><TerminalDesktop /></DCArtboard>
          <DCArtboard id="a-m" label="Mobile" width={360} height={720}><TerminalMobile /></DCArtboard>
        </DCSection>

        <DCSection id="b" title="B · Editorial"
          subtitle="Bold/editorial. Serif masthead, one big featured story, then a magazine grid. Copy is narrative — full-sentence headlines and deks.">
          <DCArtboard id="b-d" label="Desktop" width={1040} height={1060}><EditorialDesktop /></DCArtboard>
          <DCArtboard id="b-m" label="Mobile" width={360} height={1120}><EditorialMobile /></DCArtboard>
        </DCSection>

        <DCSection id="c" title="C · Changelog"
          subtitle="Corporate/trustworthy. Persistent sidebar nav, entries tagged by version + category. Copy is structured, scannable release notes.">
          <DCArtboard id="c-d" label="Desktop" width={1000} height={760}><ChangelogDesktop /></DCArtboard>
          <DCArtboard id="c-m" label="Mobile" width={360} height={720}><ChangelogMobile /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
