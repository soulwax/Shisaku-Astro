<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bluesix · devlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fbfaf7;
    --raise: #ffffff;
    --ink: #2c2b29;
    --soft: #76746e;
    --body: #45433f;
    --line: #e2e0d9;
    --line-strong: #d0cec7;
    --accent: #3a6df0;
    --logo-off: #2c2b29;
    --mono: "Spline Sans Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
    --hand: "Caveat", cursive;
  }
  html[data-theme="dark"] {
    --paper: #111317;
    --raise: #171a1f;
    --ink: #e8e6e0;
    --soft: #8b8d97;
    --body: #c2c0ba;
    --line: #23262d;
    --line-strong: #2c3037;
    --accent: #6f9bff;
    --logo-off: #c2c0ba;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    transition: background .25s ease, color .25s ease;
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 28px 80px; }

  /* ---- header ---- */
  header {
    position: sticky; top: 0; z-index: 5;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1.5px solid var(--line);
  }
  .head-in {
    max-width: 720px; margin: 0 auto; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .logo { display: inline-grid; grid-template-columns: repeat(3, 9px); grid-auto-rows: 9px; gap: 3px; }
  .logo i { background: var(--logo-off); border-radius: 2px; }
  .logo i:nth-child(5) { background: var(--accent); }
  .path { font-size: 15px; font-weight: 600; }
  .path .dim { color: var(--soft); font-weight: 400; }
  nav { display: flex; align-items: center; gap: 18px; }
  nav a { font-size: 12.5px; color: var(--soft); text-decoration: none; transition: color .15s; }
  nav a:hover { color: var(--accent); }

  /* theme toggle */
  .toggle {
    appearance: none; border: 1.5px solid var(--line-strong); background: var(--raise);
    color: var(--ink); font-family: var(--mono); font-size: 12px;
    width: 34px; height: 34px; border-radius: 9px; cursor: pointer;
    display: grid; place-items: center; transition: border-color .15s, color .15s, background .25s;
  }
  .toggle:hover { border-color: var(--accent); color: var(--accent); }
  .toggle .ico { width: 16px; height: 16px; display: block; }
  html[data-theme="dark"] .toggle .sun { display: block; }
  html[data-theme="dark"] .toggle .moon { display: none; }
  html[data-theme="light"] .toggle .sun { display: none; }
  html[data-theme="light"] .toggle .moon { display: block; }

  /* ---- prompt ---- */
  .prompt { margin: 30px 0 4px; font-size: 13px; color: var(--soft); display: flex; align-items: center; gap: 3px; }
  .cursor { display: inline-block; width: 8px; height: 15px; background: var(--accent); animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

  /* ---- feed ---- */
  .feed { display: flex; flex-direction: column; }
  .entry {
    padding: 22px 0; border-bottom: 1px dashed var(--line-strong);
    display: block; text-decoration: none; color: inherit;
  }
  .entry:hover .e-title { color: var(--accent); }
  .e-meta { font-size: 11.5px; color: var(--soft); }
  .e-title { font-size: 18px; font-weight: 600; margin: 7px 0 6px; transition: color .15s; }
  .e-title .caret { color: var(--accent); }
  .e-body { font-size: 13px; line-height: 1.6; color: var(--body); }
  .e-tags { display: flex; flex-wrap: wrap; gap: 11px; margin-top: 11px; font-size: 11.5px; color: var(--accent); }

  footer { margin-top: 34px; font-size: 11.5px; color: var(--soft); display: flex; flex-wrap: wrap; gap: 8px 16px; }
  footer a { color: var(--soft); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* wireframe margin note */
  .note { font-family: var(--hand); font-size: 18px; color: var(--accent); opacity: .8; margin: 26px 0 -10px; transform: rotate(-1deg); }
  .note::before { content: "✎ "; opacity: .6; }

  @media (max-width: 560px) {
    nav .links { display: none; }
    .head-in, .wrap { padding-left: 18px; padding-right: 18px; }
    .e-title { font-size: 16px; }
  }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <span class="logo" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></span>
      <span class="path">bluesix<span class="dim"> ~/devlog</span></span>
    </div>
    <nav>
      <span class="links" style="display:flex; gap:18px;">
        <a href="#">latest</a>
        <a href="#">tags</a>
        <a href="#">rss</a>
        <a href="#">about</a>
      </span>
      <button class="toggle" id="themeBtn" aria-label="Toggle dark mode" title="Toggle theme">
        <svg class="ico moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="ico sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
      </button>
    </nav>
  </div>
</header>

<main class="wrap">
  <div class="prompt">$ ls -t devlog/ <span class="cursor"></span></div>
  <div class="note">wireframe — real logo + posts drop straight in here</div>
  <div class="feed" id="feed"></div>
  <footer>
    <a href="#">feed.xml</a>
    <span>·</span>
    <a href="#">github/bluesix</a>
    <span>·</span>
    <span>built in the open</span>
  </footer>
</main>

<script>
  const ENTRIES = [
    { date: '2026.06.20', build: '#0042', read: '4 min', title: 'shipping the new query planner',
      body: 'rewrote the planner around a cost model. ~3x on multi-join reads, far fewer pathological plans. notes on what broke.',
      tags: ['+rust', '+postgres', '+perf'] },
    { date: '2026.06.11', build: '#0041', read: '2 min', title: 'wasm build is finally under 200kb',
      body: 'dropped the regex crate, hand-rolled the tokenizer. boot time halved. teardown of the diff.',
      tags: ['+wasm', '+size'] },
    { date: '2026.05.29', build: '#0040', read: '6 min', title: 'why i killed the plugin system',
      body: 'two users, infinite support surface. ripped it out, kept the good parts as config. postmortem.',
      tags: ['+architecture', '+regret'] },
    { date: '2026.05.14', build: '#0039', read: '3 min', title: 'a weekend with io_uring',
      body: 'tried to make ingest faster. mostly learned how io_uring actually schedules. numbers inside.',
      tags: ['+linux', '+io'] },
    { date: '2026.04.30', build: '#0038', read: '5 min', title: 'typed errors, finally',
      body: 'swapped stringly-typed failures for an error enum. the compiler now catches what code review missed.',
      tags: ['+rust', '+dx'] },
  ];

  const feed = document.getElementById('feed');
  feed.innerHTML = ENTRIES.map(e => `
    <a class="entry" href="#">
      <div class="e-meta">${e.date}<span style="color:var(--soft)">  ·  build ${e.build}  ·  ${e.read}</span></div>
      <div class="e-title"><span class="caret">&gt;</span> ${e.title}</div>
      <div class="e-body">${e.body}</div>
      <div class="e-tags">${e.tags.map(t => `<span>${t}</span>`).join('')}</div>
    </a>`).join('');

  // ---- theme: stored choice wins, else follow system ----
  const KEY = 'bluesix-theme';
  const root = document.documentElement;
  const sys = matchMedia('(prefers-color-scheme: dark)');
  function apply(t) { root.setAttribute('data-theme', t); }
  const stored = localStorage.getItem(KEY);
  apply(stored || (sys.matches ? 'dark' : 'light'));
  sys.addEventListener('change', e => { if (!localStorage.getItem(KEY)) apply(e.matches ? 'dark' : 'light'); });
  document.getElementById('themeBtn').addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    apply(next);
    localStorage.setItem(KEY, next);
  });
</script>
</body>
</html>
